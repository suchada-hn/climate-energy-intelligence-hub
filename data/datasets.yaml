  repo_url: https://github.com/pypsa-meets-earth/pypsa-kz-data
  license: MIT
  maturity: research
  modality: mixed
  region_tags: [KAZ]
  collections:
    - pypsa-earth-ecosystem

- id: pypsa-zm-data
  name: PyPSA Zambia Data Bundle
  kind: country_data_bundle
  short_description: >-
    Country-specific data bundle for Zambia energy modeling with validated
